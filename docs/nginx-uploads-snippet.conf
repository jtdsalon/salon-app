# Add this block to /etc/nginx/sites-available/salon-qa
# Place it AFTER the /user-app/ block and BEFORE the # API → backend block.
# Then run: sudo nginx -t && sudo systemctl reload nginx

    # Uploaded files (avatars, salon images) – proxy to backend so images load
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
