# Example: /etc/nginx/sites-available/salon-qa
# Enable: sudo ln -sf /etc/nginx/sites-available/salon-qa /etc/nginx/sites-enabled/
# Test:   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    # Salon App (SPA: fallback to index.html for client-side routes)
    location /salon-app/ {
        root /var/www;
        index index.html;
        try_files $uri $uri/ /salon-app/index.html;
    }

    # User App (SPA: fallback to index.html for client-side routes)
    location /user-app/ {
        root /var/www;
        index index.html;
        try_files $uri $uri/ /user-app/index.html;
    }

    # Uploaded files (avatars, salon images, etc.) – proxy to backend
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API → backend
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
